name: Daily cosme news digest

on:
  schedule:
    # JST 09:05 = UTC 00:05。曜日は UTC でも同日扱いなので 1-5 (Mon-Fri) のまま。
    # UTC 00:00 ジャストは GitHub Actions の混雑帯で公式に「避けろ」と書かれている
    # （毎時 00 分はすべての cron が集中する）。5 分外すだけで遅延リスクを下げられる。
    # 1 時間遅延しても JST 10 時台前半に収まる想定。
    # 祝日 / 年末年始は src/calendar.ts の shouldSkipToday() (JST 基準) で配信前にスキップ。
    - cron: "5 0 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (true = Slack に投稿せず stdout のみ)"
        type: boolean
        required: false
        default: false

concurrency:
  group: daily-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}
          DRY_RUN: ${{ inputs.dry_run || vars.DRY_RUN || 'false' }}
        run: pnpm start

      - name: Commit updated state (seen.json + trends/)
        if: ${{ (inputs.dry_run || vars.DRY_RUN || 'false') != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/seen.json
          if [ -d state/trends ]; then
            git add state/trends
          fi
          if git diff --cached --quiet; then
            echo "no state changes"
          else
            git commit -m "chore(state): update state after $(date -u +%Y-%m-%dT%H:%MZ) run"
            git push
          fi
