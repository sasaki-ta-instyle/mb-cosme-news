name: Daily cosme news digest

on:
  # 2026-06-26: GitHub Actions の schedule trigger は実測で 4 時間以上遅延した
  # (JST 09:05 設定 → 実発火 JST 13:15)。実用性が無いため schedule を廃止し、
  # ConoHa の crontab から scripts/trigger-daily.sh 経由で workflow_dispatch を
  # 叩く運用に切り替えた。詳細は docs/external-cron.md。
  # schedule:
  #   - cron: "5 0 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (true = Slack に投稿せず stdout のみ)"
        type: boolean
        required: false
        default: false

concurrency:
  group: daily-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}
          DRY_RUN: ${{ inputs.dry_run || vars.DRY_RUN || 'false' }}
        run: pnpm start

      - name: Commit updated state (seen.json + trends/)
        if: ${{ (inputs.dry_run || vars.DRY_RUN || 'false') != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/seen.json
          if [ -d state/trends ]; then
            git add state/trends
          fi
          if git diff --cached --quiet; then
            echo "no state changes"
          else
            git commit -m "chore(state): update state after $(date -u +%Y-%m-%dT%H:%MZ) run"
            git push
          fi
